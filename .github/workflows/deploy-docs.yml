name: Deploy Docs
on:
  push:
    branches: [main]
    paths: ['website/**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd website && npm ci
      - run: cd website && npx docusaurus build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: website/build
      - id: deployment
        uses: actions/deploy-pages@v4
