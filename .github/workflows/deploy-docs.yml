name: Deploy Docs
on:
  push:
    branches: [main]
    paths: ['website/**']
permissions:
  pages: write
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd website && npm ci
      - run: cd website && npx docusaurus build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: website/build
      - id: deployment
        uses: actions/deploy-pages@v4
