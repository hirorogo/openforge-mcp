name: Deploy Docs
on:
  push:
    branches: [main]
    paths: ['website/**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd website && npm ci
      - run: cd website && npx docusaurus build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build
      - uses: actions/deploy-pages@v4
